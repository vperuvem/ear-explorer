<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HighJump EAR Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif;
         background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 100%);
         background-attachment: fixed; color: #0f172a; min-height: 100vh; }

  header { background: #ffffff; padding: 10px 24px; border-bottom: 3px solid #7c3aed;
           display: flex; align-items: center; gap: 12px;
           box-shadow: 0 2px 8px rgba(124,58,237,0.10); flex-wrap: nowrap; }
  header h1 { font-size: 1.2rem; color: #7c3aed; white-space: nowrap; margin-right: 8px; }
  header input, header select {
    background: #f5f3ff; border: 1.5px solid #c4b5fd; color: #1e1b4b;
    padding: 5px 10px; border-radius: 6px; font-size: 0.88rem; outline: none; height: 32px; }
  header input:focus, header select:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.18); }
  header button {
    background: #7c3aed; color: #ffffff; border: none; padding: 5px 14px;
    border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.88rem; height: 32px; }
  header button:hover { background: #6d28d9; }
  #btn-back { background: #ede9fe; color: #6d28d9; display: none; border: none; }
  #btn-back:hover { background: #ddd6fe; }

  /* Scope multi-select dropdown */
  .scope-wrap { position: relative; display: inline-block; }
  .scope-btn  { background: #f5f3ff; border: 1.5px solid #c4b5fd; color: #1e1b4b;
                padding: 5px 10px; border-radius: 6px; font-size: 0.88rem; height: 32px;
                cursor: pointer; white-space: nowrap; user-select: none; }
  .scope-btn:hover { border-color: #7c3aed; }
  .scope-menu { display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 300;
                background: #ffffff; border: 1.5px solid #c4b5fd; border-radius: 8px;
                box-shadow: 0 6px 18px rgba(124,58,237,0.18); min-width: 230px; padding: 4px 0; }
  .scope-menu.open { display: block; }
  .scope-option { display: flex; align-items: center; gap: 9px; padding: 7px 14px;
                  cursor: pointer; font-size: 0.83rem; color: #1e1b4b; }
  .scope-option:hover { background: #ede9fe; }
  .scope-option input[type=checkbox] { cursor: pointer; accent-color: #7c3aed; width: 14px; height: 14px; }
  .scope-option .scope-label { font-weight: 600; }
  .scope-option .scope-sub   { font-size: 0.73rem; color: #6b7280; margin-left: auto; }
  .scope-section { padding: 6px 14px 2px; font-size: 0.68rem; font-weight: 700;
                   color: #7c3aed; text-transform: uppercase; letter-spacing: 0.06em; }
  .scope-divider { border: none; border-top: 1px solid #e9d5ff; margin: 4px 0; }

  /* App name badge on device list items */
  .app-badge { font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 12px;
               background: #ede9fe; color: #6d28d9; white-space: nowrap; cursor: pointer;
               border: 1.5px solid #c4b5fd; margin-left: 8px; flex-shrink: 0; }
  .app-badge:hover { background: #ddd6fe; border-color: #7c3aed; }

  /* Match-type badge on proc list items */
  .match-badge { font-size: 0.7rem; font-weight: 700; padding: 2px 7px; border-radius: 4px;
                 white-space: nowrap; margin-top: 3px; }
  .mb-process  { background: #d1fae5; color: #065f46; }
  .mb-action   { background: #dbeafe; color: #1e40af; }
  .mb-db       { background: #fef9c3; color: #854d0e; }
  .mb-calc     { background: #e0f2fe; color: #075985; }
  .mb-compare  { background: #fce7f3; color: #9d174d; }




  /* Process list view */
  .proc-list { padding: 16px 24px; }
  .proc-list-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px;
                    background: #ffffff; border: none; border-left: 4px solid #7c3aed;
                    border-radius: 8px; margin-bottom: 8px; cursor: pointer;
                    transition: transform 0.1s, box-shadow 0.1s;
                    box-shadow: 0 2px 8px rgba(124,58,237,0.10); }
  .proc-list-item:hover { transform: translateX(3px); box-shadow: 0 4px 16px rgba(124,58,237,0.22); }

  .proc-list-icon { font-size: 1.1rem; }
  .proc-list-name { font-weight: 600; color: #000000; font-size: 0.95rem; }
  .proc-list-desc { font-size: 0.8rem; color: #000000; margin-top: 2px; }
  .proc-list-version { font-size: 0.75rem; color: #000000;
                       background: #ede9fe; border-radius: 4px; padding: 2px 8px; font-weight: 600; }
  .proc-list-right   { margin-left: auto; display: flex; flex-direction: column;
                       align-items: flex-end; gap: 3px; }

  .grid-wrap { overflow: auto; padding: 16px 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem;
          background: #ffffff; border-radius: 10px; overflow: hidden;
          box-shadow: 0 4px 20px rgba(67,56,202,0.12); }
  thead th { background: linear-gradient(90deg, #6d28d9 0%, #4338ca 100%); color: #ffffff;
             padding: 9px 12px; text-align: left; position: sticky; top: 0;
             white-space: nowrap; border-bottom: 2px solid #5b21b6;
             cursor: pointer; user-select: none; }
  thead th:hover { background: linear-gradient(90deg, #7c3aed 0%, #4f46e5 100%); }
  tbody tr { border-bottom: 1px solid rgba(0,0,0,0.06); cursor: pointer; transition: filter 0.1s; }
  tbody tr:hover { filter: brightness(0.90); }
  tbody tr.commented { font-style: italic; }
  tbody tr.selected { outline: 3px solid #7c3aed; outline-offset: -1px; }
  tbody td { padding: 7px 12px; white-space: nowrap; max-width: 320px;
             overflow: hidden; text-overflow: ellipsis; color: #000000; }
  td.seq  { width: 48px; text-align: center; font-weight: 700; color: #000000;
            background: rgba(255,255,255,0.55); border-radius: 4px; }
  td.label-col { width: 90px; font-weight: 700; color: #000000; }
  td.pass { color: #000000; font-weight: 700; }
  td.fail { color: #000000; font-weight: 700; }
  .label-link { cursor: pointer; text-decoration: underline dotted #6d28d9; font-weight: 700; color: #000000; }
  .label-link:hover { text-decoration-style: solid; background: rgba(109,40,217,0.08); border-radius: 3px; }
  @keyframes jumpFlash {
    0%   { outline: none; }
    10%  { outline: 3px solid #f59e0b; outline-offset: -1px; }
    80%  { outline: 3px solid #f59e0b; outline-offset: -1px; }
    100% { outline: none; }
  }
  tr.jump-highlight { animation: jumpFlash 1.5s ease-out; }

  /* Process group header row */
  tr.group-header td { background: #6d28d9; color: #ffffff; font-weight: 700;
                       font-size: 0.9rem; padding: 8px 12px; letter-spacing: 0.03em;
                       cursor: pointer; border-top: 3px solid #5b21b6; user-select: none; }
  tr.group-header:hover td { background: #7c3aed; }
  tr.group-header .proc-badge { display: inline-block; background: rgba(255,255,255,0.22);
                                 border-radius: 4px; padding: 1px 8px; margin-left: 8px;
                                 font-size: 0.75rem; font-weight: 500; }
  tr.group-header .toggle-icon { margin-right: 8px; font-style: normal; }
  tr.group-header .callers-link { display: inline-block; background: rgba(255,255,255,0.18);
                                   border-radius: 4px; padding: 1px 10px; margin-left: 12px;
                                   font-size: 0.75rem; font-weight: 500; cursor: pointer;
                                   text-decoration: underline dotted rgba(255,255,255,0.6); }
  tr.group-header .callers-link:hover { background: rgba(255,255,255,0.35); }
  tr.group-header .proc-name-link { cursor: pointer; text-decoration: underline dotted rgba(255,255,255,0.7); }
  tr.group-header .proc-name-link:hover { text-decoration-style: solid; }
  tr.detail-row { display: none; } /* collapsed by default */
  tr.drillable     td.action-name { color: #000000; text-decoration: underline dotted; cursor: pointer; font-weight: 700; }
  tr.db-clickable  td.action-name { color: #000000; text-decoration: underline dotted; cursor: pointer; font-weight: 700; }
  tr.list-clickable    td.action-name { color: #000000; text-decoration: underline dotted; cursor: pointer; font-weight: 700; }
  tr.calc-clickable    td.action-name { color: #000000; text-decoration: underline dotted; cursor: pointer; font-weight: 700; }
  tr.compare-clickable td.action-name { color: #000000; text-decoration: underline dotted; cursor: pointer; font-weight: 700; }
  tr.dialog-clickable  td.action-name { color: #000000; text-decoration: underline dotted; cursor: pointer; font-weight: 700; }
  .db-statement { background: #f8fafc; color: #000000; font-family: 'Courier New', monospace;
                  font-size: 0.78rem; padding: 12px; border-radius: 6px; white-space: pre-wrap;
                  word-break: break-all; margin-top: 8px; max-height: 400px; overflow-y: auto;
                  border: 1.5px solid #bbf7d0; }

  /* Action type row colors — pastel palette */
  .at-1   { background: #d1fae5; }  /* Process   – pastel mint      */
  .at-3   { background: #e0f2fe; }  /* Calculate – pastel sky blue  */
  .at-4   { background: #fce7f3; }  /* Compare   – pastel pink      */
  .at-5   { background: #fef9c3; }  /* Database  – pastel yellow    */
  .at-6   { background: #fef9c3; }  /* Dialog    – pastel yellow    */
  .at-7   { background: #fee2e2; }  /* Execute   – pastel red       */
  .at-9   { background: #fef9c3; }  /* List      – pastel yellow    */
  .at-11  { background: #fce7f3; }  /* Receive   – pastel pink      */
  .at-12  { background: #fef3c7; }  /* Report    – pastel amber     */
  .at-13  { background: #dbeafe; }  /* Send      – pastel blue      */
  .at-14  { background: #ecfccb; }  /* User      – pastel lime      */
  .at-19  { background: #d1fae5; }  /* Record    – pastel mint      */
  .at-neg1{ background: #ffffff; }  /* Comment   – white            */

  #detail-panel { display: none; position: fixed; top: 0; right: 0; width: 420px; height: 100vh;
                  background: linear-gradient(160deg, #f5f3ff 0%, #eff6ff 100%);
                  border-left: 3px solid #a78bfa; overflow-y: auto;
                  padding: 20px; z-index: 100; box-shadow: -6px 0 24px rgba(124,58,237,0.18); }
  #detail-panel h2 { color: #6d28d9; margin-bottom: 12px; font-size: 1rem; font-weight: 700; }
  #detail-panel .close-btn { float: right; background: none; border: none; color: #dc2626;
                              font-size: 1.2rem; cursor: pointer; }
  .detail-row { display: flex; gap: 8px; margin-bottom: 8px; font-size: 0.83rem; }
  .detail-label { color: #000000; min-width: 110px; font-weight: 600; }
  .detail-val { color: #000000; word-break: break-all; font-weight: 500; }

</style>
</head>
<body>

<header>
  <h1>⚙️ HighJump EAR Explorer</h1>
  <input id="inp-process" type="text" placeholder="Search term…" value="menu" style="width:185px"/>
  <input id="inp-app"     type="text" placeholder="Application"   value="WA"   style="width:65px"/>

  <!-- Combined options dropdown -->
  <div class="scope-wrap" id="scope-wrap">
    <button class="scope-btn" id="scope-btn" type="button" onclick="toggleScopeMenu()">🔎 Options ▾</button>
    <div class="scope-menu" id="scope-menu">
      <label class="scope-option"><input type="checkbox" class="type-cb" value="1" checked/> <span class="scope-label">Process</span>        <span class="scope-sub">Name</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="3"/>          <span class="scope-label">Calculate</span>       <span class="scope-sub">Name · Expression</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="4"/>          <span class="scope-label">Compare</span>         <span class="scope-sub">Name · Operand</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="5"/>          <span class="scope-label">Database</span>        <span class="scope-sub">Name · SQL</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="6"/>          <span class="scope-label">Dialog / Screen</span> <span class="scope-sub">Name · Label</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="7"/>          <span class="scope-label">Execute</span>         <span class="scope-sub">Name · Label</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="9"/>          <span class="scope-label">List</span>            <span class="scope-sub">Name · Label</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="11"/>         <span class="scope-label">Receive</span>         <span class="scope-sub">Name · Message</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="13"/>         <span class="scope-label">Send</span>            <span class="scope-sub">Name · Message</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="14"/>         <span class="scope-label">User</span>            <span class="scope-sub">Name</span></label>
      <label class="scope-option"><input type="checkbox" class="type-cb" value="-1"/>         <span class="scope-label">Comment</span>         <span class="scope-sub">Comment text</span></label>
    </div>
  </div>
  <button onclick="loadData()">🔍 Search</button>
  <button id="btn-back" onclick="goBack()">← Back</button>
  <a href="http://localhost:9001" target="_blank"
     style="background:#ede9fe;color:#6d28d9;border:1.5px solid #c4b5fd;padding:5px 12px;
            border-radius:6px;font-size:0.83rem;font-weight:600;text-decoration:none;
            display:inline-flex;align-items:center;white-space:nowrap;">Tester</a>
  <select id="inp-server" style="margin-left:auto; font-size:0.8rem; border:1.5px solid #c4b5fd;
          border-radius:6px; padding:3px 8px; background:#f5f3ff; color:#1e1b4b; font-weight:600; cursor:pointer;">
    <option value="ArcadiaWHJSqlStage" selected>ArcadiaWHJSqlStage</option>
    <option value="RetailRHjsqldev">RetailRHjsqldev</option>
    <option value="RetailRHjsqlStage">RetailRHjsqlStage</option>
  </select>
</header>




<div class="proc-list" id="proc-list-view" style="display:none"></div>

<div class="grid-wrap" id="grid-view">
  <table id="grid">
    <thead>
      <tr>
        <th style="width:52px">Line</th>
        <th style="width:90px">Label</th>
        <th style="width:110px">Action</th>
        <th>Step</th>
        <th style="width:90px">On Pass</th>
        <th style="width:90px">On Fail</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div id="detail-panel">
  <button class="close-btn" onclick="closeDetail()">✕</button>
  <h2 id="detail-title">Step Detail</h2>
  <div id="detail-content"></div>
</div>

<script>
const ACTION_COLORS = {
  '1':'#d1fae5','3':'#e0f2fe','4':'#fce7f3', '5':'#fef9c3',
  '6':'#fef9c3','7':'#fee2e2','9':'#fef9c3', '10':'#e0f7fa',
  '11':'#fce7f3','12':'#fef3c7','13':'#dbeafe','14':'#ecfccb',
  '16':'#f3e8ff','17':'#fdf4ff','18':'#f0fdf4','19':'#d1fae5',
  '-1':'#ffffff'
};
const ACTION_LABELS = {
  '1':'Process','3':'Calculate','4':'Compare', '5':'Database',
  '6':'Dialog', '7':'Execute', '9':'List',    '10':'Publish',
  '11':'Receive','12':'Report','13':'Send',   '14':'User',
  '16':'Locale','17':'Field',  '18':'Constant','19':'Record',
  '-1':'Comment'
};

let allRows    = [];
let searchList = [];   // list of matching process objects from /api/search
let viewMode   = 'list';  // 'list' | 'detail'
let sortCol = 'process_name', sortAsc = true;
let navStack = [];  // history stack



function getServer() { return document.getElementById('inp-server').value; }

// Scope dropdown toggle
function toggleScopeMenu() {
  document.getElementById('scope-menu').classList.toggle('open');
}
// Close scope menu when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('scope-wrap').contains(e.target))
    document.getElementById('scope-menu').classList.remove('open');
});
// Keep label on Options button in sync with checked type boxes
function updateScopeBtn() {
  const labels = [...document.querySelectorAll('.type-cb:checked')]
    .map(cb => cb.closest('label').querySelector('.scope-label').textContent.trim());
  document.getElementById('scope-btn').textContent =
    '🔎 ' + (labels.length ? labels.join(' · ') : 'Filter') + ' ▾';
}
// Type checkboxes → update button label only (these control search scope, not display filter)
document.querySelectorAll('.type-cb').forEach(cb =>
  cb.addEventListener('change', updateScopeBtn));

// Load T_DEVICE processes on first screen
async function loadDevices() {
  try {
    const res = await fetch(`/api/devices?server=${encodeURIComponent(getServer())}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    searchList = data;
    viewMode = 'list';
    navStack = [];
    document.getElementById('btn-back').style.display = 'none';
    renderDeviceList();
  } catch(e) {
    console.warn('Device load failed:', e.message);
  }
}

function renderDeviceList() {
  document.getElementById('proc-list-view').style.display = 'block';
  document.getElementById('grid-view').style.display      = 'none';
  const container = document.getElementById('proc-list-view');
  if (!searchList.length) {
    container.innerHTML = '<p style="color:#8892a4;padding:12px">No device processes found.</p>';
    return;
  }

  // Terminals first, then descending by app name
  const sorted = searchList.slice().sort((a, b) => {
    const aT = /terminal/i.test(a.dev_type) ? 0 : 1;
    const bT = /terminal/i.test(b.dev_type) ? 0 : 1;
    if (aT !== bT) return aT - bT;
    return b.app_name.localeCompare(a.app_name);
  });

  container.innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:0.88rem;
                  background:#ffffff;border-radius:10px;overflow:hidden;
                  box-shadow:0 4px 20px rgba(67,56,202,0.12);">
      <thead>
        <tr style="background:#6d28d9;color:#ffffff;">
          <th style="padding:8px 14px;text-align:left;border-right:1px solid #7c3aed;width:160px">Application</th>
          <th style="padding:8px 14px;text-align:left;border-right:1px solid #7c3aed;width:160px">Device Type</th>
          <th style="padding:8px 14px;text-align:left;">Entry Process</th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map((p, i) => `
          <tr class="device-item" data-idx="${i}"
              style="border-bottom:1px solid #e9d5ff;cursor:pointer;transition:background 0.1s;"
              onmouseover="this.style.background='#ede9fe'" onmouseout="this.style.background=''">
            <td style="padding:8px 14px;border-right:1px solid #e9d5ff;font-weight:700;color:#6d28d9;">
              <span class="app-badge" data-app="${esc(p.app_name)}" title="Click to set application filter">${esc(p.app_name)}</span>
            </td>
            <td style="padding:8px 14px;border-right:1px solid #e9d5ff;color:#374151;">${esc(p.dev_type)}</td>
            <td style="padding:8px 14px;color:#000;">⚙️ ${esc(p.process_name)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;

  // Row click → set app + open process; badge click → set app only
  container.querySelectorAll('.device-item').forEach((el, i) => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('app-badge')) {
        document.getElementById('inp-app').value = e.target.dataset.app;
        return;
      }
      document.getElementById('inp-app').value = sorted[i].app_name;
      openProcess(sorted[i].id, sorted[i].process_name, true);
    });
  });
}

// Search — shows list of matching process objects
async function loadData() {
  const process = document.getElementById('inp-process').value.trim();
  const app     = document.getElementById('inp-app').value.trim();
  const types   = [...document.querySelectorAll('.type-cb:checked')].map(cb => cb.value);
  const scope   = types.length ? types.join(',') : '1';
  try {
    const res = await fetch(`/api/search?process=${encodeURIComponent(process)}&application=${encodeURIComponent(app)}&scope=${encodeURIComponent(scope)}&server=${encodeURIComponent(getServer())}`);
    searchList = await res.json();
    if (searchList.error) throw new Error(searchList.error);
    viewMode = 'list';
    navStack = [];
    document.getElementById('btn-back').style.display = 'none';
    renderProcessList();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

// Sync Back button text to the top of the nav stack
function updateBackButton() {
  const backBtn = document.getElementById('btn-back');
  if (!navStack.length) { backBtn.style.display = 'none'; return; }
  backBtn.style.display = 'inline-block';
  const top = navStack[navStack.length - 1];
  backBtn.textContent = `← ${top.backLabel}`;
}

// Open a specific process by ID — shows its steps
async function openProcess(processId, processName, pushToStack) {
  const app = document.getElementById('inp-app').value.trim();
  if (pushToStack) {
    const searchTerm = document.getElementById('inp-process').value;
    navStack.push({ mode: 'list', searchList: searchList.slice(), processInput: searchTerm,
                    backLabel: `Search: "${searchTerm}"` });
    updateBackButton();
  }
  // Update search box to exact name of the clicked process
  document.getElementById('inp-process').value = processName;
  try {
    const res = await fetch(`/api/process/${encodeURIComponent(processId)}?application=${encodeURIComponent(app)}&server=${encodeURIComponent(getServer())}`);
    allRows = await res.json();
    if (allRows.error) throw new Error(allRows.error);
    viewMode = 'detail';
    closeDetail();
    renderTable();
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

function renderProcessList() {
  document.getElementById('proc-list-view').style.display = 'block';
  document.getElementById('grid-view').style.display      = 'none';
  const container = document.getElementById('proc-list-view');
  if (!searchList.length) {
    container.innerHTML = '<p style="color:#8892a4;padding:12px">No matching processes found.</p>';
    return;
  }
  // match_type is now the action_type number string ('1','3','4','5',…)
  // Map directly to ACTION_COLORS and ACTION_LABELS used in the drilldown
  const matchColor = t => ACTION_COLORS[t] || '#f4f6fb';
  const matchLabel = t => ACTION_LABELS[t] || '';
  // Use data attributes to avoid quote-escaping issues in onclick
  container.innerHTML = searchList.map(p => {
    const bg         = matchColor(p.match_type);
    const isProcess  = p.match_type === '1';
    const primaryTxt = esc(p.action_name || p.name);
    // For action-type results show the parent process name as sub-line; for process results show description
    const subLine    = isProcess
      ? (p.description ? `<div class="proc-list-desc">${esc(p.description)}</div>` : '')
      : `<div class="proc-list-desc">📋 ${esc(p.name)}</div>`;
    return `
    <div class="proc-list-item" data-id="${esc(p.id)}"
         style="background:${bg}; border-left-color:${bg};">
      <span class="proc-list-icon">⚙️</span>
      <div>
        <div class="proc-list-name">${primaryTxt}</div>
        ${subLine}
      </div>
      ${p.match_type ? `<div class="proc-list-right"><span class="match-badge">${esc(matchLabel(p.match_type))}</span></div>` : ''}
    </div>`;
  }).join('');
  // Attach click handlers after rendering using the data-id to look up the process
  container.querySelectorAll('.proc-list-item').forEach((el, i) => {
    el.addEventListener('click', () => openProcess(searchList[i].id, searchList[i].name, true));
  });
}

// Jump to the row whose label matches, expanding its group if collapsed
function jumpToLabel(label) {
  const rows = document.querySelectorAll('tbody tr.detail-row');
  for (const row of rows) {
    const lc = row.querySelector('td.label-col');
    if (lc && lc.textContent.trim() === label.trim()) {
      if (row.style.display === 'none') {
        row.style.display = '';
        const gk = row.dataset.group;
        if (gk) {
          const hdr = document.querySelector(`tr.group-header[data-group="${gk}"]`);
          if (hdr) { const ic = hdr.querySelector('.toggle-icon'); if (ic) ic.textContent = '▼'; }
        }
      }
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      row.classList.remove('jump-highlight');
      void row.offsetWidth; // restart animation if already highlighted
      row.classList.add('jump-highlight');
      setTimeout(() => row.classList.remove('jump-highlight'), 1500);
      return;
    }
  }
}

// Shared: reveal a row if collapsed, scroll to it and flash
function jumpToRow(row) {
  if (!row) return;
  if (row.style.display === 'none') {
    row.style.display = '';
    const gk = row.dataset.group;
    if (gk) {
      const hdr = document.querySelector(`tr.group-header[data-group="${gk}"]`);
      if (hdr) { const ic = hdr.querySelector('.toggle-icon'); if (ic) ic.textContent = '▼'; }
    }
  }
  row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  row.classList.remove('jump-highlight'); void row.offsetWidth;
  row.classList.add('jump-highlight');
  setTimeout(() => row.classList.remove('jump-highlight'), 1500);
}

function jumpToNext(seq) {
  // Skip comment rows when moving forward
  const rows = [...document.querySelectorAll('tbody tr.detail-row')]
    .filter(r => parseInt(r.dataset.seq) > seq && !r.classList.contains('commented'))
    .sort((a, b) => parseInt(a.dataset.seq) - parseInt(b.dataset.seq));
  jumpToRow(rows[0]);
}
function jumpToPrev(seq) {
  // Skip comment rows when moving backward
  const rows = [...document.querySelectorAll('tbody tr.detail-row')]
    .filter(r => parseInt(r.dataset.seq) < seq && !r.classList.contains('commented'))
    .sort((a, b) => parseInt(b.dataset.seq) - parseInt(a.dataset.seq));
  jumpToRow(rows[0]);
}
function jumpToFirst() {
  // TOP: first non-comment row
  const rows = [...document.querySelectorAll('tbody tr.detail-row')]
    .filter(r => !r.classList.contains('commented'))
    .sort((a, b) => parseInt(a.dataset.seq) - parseInt(b.dataset.seq));
  jumpToRow(rows[0]);
}
function jumpToLast() {
  // BOTTOM: last non-comment row
  const rows = [...document.querySelectorAll('tbody tr.detail-row')]
    .filter(r => !r.classList.contains('commented'))
    .sort((a, b) => parseInt(b.dataset.seq) - parseInt(a.dataset.seq));
  jumpToRow(rows[0]);
}

// Resolve the destination sequence number at render time so we can show it in the link
function getTargetSeq(direction, row) {
  const pid = String(row.process_id);
  const seq = row.sequence;
  const same = allRows.filter(r => String(r.process_id) === pid && r.action_type !== -1);
  switch (direction) {
    case 'next':  { const c = same.filter(r => r.sequence > seq).sort((a,b) => a.sequence - b.sequence); return c.length ? c[0].sequence : null; }
    case 'prev':  { const c = same.filter(r => r.sequence < seq).sort((a,b) => b.sequence - a.sequence); return c.length ? c[0].sequence : null; }
    case 'first': { const c = [...same].sort((a,b) => a.sequence - b.sequence); return c.length ? c[0].sequence : null; }
    case 'last':  { const c = [...same].sort((a,b) => b.sequence - a.sequence); return c.length ? c[0].sequence : null; }
  }
  return null;
}
function getLabelTargetSeq(label, row) {
  const pid = String(row.process_id);
  const found = allRows.find(r => String(r.process_id) === pid && (r.label || '').trim() === label.trim());
  return found ? found.sequence : null;
}
function seqBadge(seq) { return seq != null ? ` <span style="font-size:0.75em;opacity:0.7">(${seq})</span>` : ''; }

// Render a pass/fail label cell
const NO_LINK = new Set(['PASS','FAIL']);
function makePassFail(val, r) {
  if (!val) return '';
  const seq = r.sequence;
  const up = val.toUpperCase();
  if (NO_LINK.has(up))   return val;   // plain text
  if (up === 'NEXT') {
    const t = getTargetSeq('next', r);
    return `<span class="label-link" onclick="event.stopPropagation();jumpToNext(${seq})">↪ NEXT${seqBadge(t)}</span>`;
  }
  if (up === 'PREVIOUS') {
    const t = getTargetSeq('prev', r);
    return `<span class="label-link" onclick="event.stopPropagation();jumpToPrev(${seq})">↪ PREVIOUS${seqBadge(t)}</span>`;
  }
  if (up === 'TOP') {
    const t = getTargetSeq('first', r);
    return `<span class="label-link" onclick="event.stopPropagation();jumpToFirst()">↪ TOP${seqBadge(t)}</span>`;
  }
  if (up === 'BOTTOM') {
    const t = getTargetSeq('last', r);
    return `<span class="label-link" onclick="event.stopPropagation();jumpToLast()">↪ BOTTOM${seqBadge(t)}</span>`;
  }
  const t = getLabelTargetSeq(val, r);
  return `<span class="label-link" onclick="event.stopPropagation();jumpToLabel('${val.replace(/'/g,"\\'")}')">↪ ${val}${seqBadge(t)}</span>`;
}

// HTML-encode any dynamic value before inserting into innerHTML
function esc(str) {
  return (str == null ? '' : String(str))
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderTable();
}

function renderTable() {
  let rows = allRows.slice();

  rows.sort((a, b) => {
    // Primary: process_name always
    const pn1 = (a.process_name || '').toLowerCase();
    const pn2 = (b.process_name || '').toLowerCase();
    if (pn1 !== pn2) return sortAsc ? (pn1 > pn2 ? 1 : -1) : (pn1 < pn2 ? 1 : -1);
    // Secondary: sequence always ascending within a process
    return a.sequence - b.sequence;
  });


  document.getElementById('proc-list-view').style.display = 'none';
  document.getElementById('grid-view').style.display      = 'block';
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  // Count distinct processes to decide auto-expand
  const distinctGroups = [...new Set(rows.map(r => r.process_name))].length;
  const autoExpand     = distinctGroups === 1;
  let lastProcess = null;
  let groupKey = 0;
  rows.forEach(r => {
    // Insert group header when process name changes
    if (r.process_name !== lastProcess) {
      lastProcess = r.process_name;
      groupKey++;
      const thisKey = groupKey;   // snapshot — fixes closure capture bug
      const groupCount = rows.filter(x => x.process_name === r.process_name).length;
      const th = document.createElement('tr');
      th.className = 'group-header';
      th.dataset.group = thisKey;
      const escId   = r.process_id;
      const escName = r.process_name.replace(/'/g, "\\'");
      const toggleIcon = autoExpand ? '' : `<span class="toggle-icon">▶</span>`;
      th.innerHTML = `<td colspan="6">${toggleIcon}⚙️ <span class="proc-name-link" onclick="event.stopPropagation();drillInto('${escId}','${escName}')">${esc(r.process_name)}</span><span class="proc-badge">${groupCount} steps</span><span class="callers-link" onclick="event.stopPropagation();showCallers('${escName}')">👥 Who calls this?</span></td>`;
      if (!autoExpand) th.onclick = () => toggleGroup(thisKey, th);
      tbody.appendChild(th);
    }
    const tr = document.createElement('tr');
    const isCommented = r.commented_out == 1;
    const typeKey = isCommented ? '-1' : String(r.action_type);
    tr.className = 'detail-row ' + (isCommented || r.action_type === -1 ? 'commented ' : '') + `at-${typeKey === '-1' ? 'neg1' : typeKey}`;
    tr.dataset.group = groupKey;
    tr.dataset.seq   = r.sequence;
    // Auto-expand: show rows immediately when only one group
    if (autoExpand) tr.style.display = 'table-row';
    tr.style.background = ACTION_COLORS[typeKey] || '#f4f6fb';
    const isProcess  = r.action_type === 1 && r.action_id;
    const isDatabase = r.action_type === 5 && r.action_id;
    const isList     = r.action_type === 9 && r.action_id;
    const isCalc     = r.action_type === 3 && r.action_id;
    const isCompare  = r.action_type === 4 && r.action_id;
    const isDialog   = r.action_type === 6 && r.action_id;
    if (isProcess)  tr.classList.add('drillable');
    if (isDatabase) tr.classList.add('db-clickable');
    if (isList)     tr.classList.add('list-clickable');
    if (isCalc)     tr.classList.add('calc-clickable');
    if (isCompare)  tr.classList.add('compare-clickable');
    if (isDialog)   tr.classList.add('dialog-clickable');
    tr.innerHTML = `
      <td class="seq">${r.sequence}</td>
      <td class="label-col">${isCommented ? '--' : esc(r.label)}</td>
      <td>${esc(r.action_type_name)}</td>
      <td class="action-name" title="${esc(r.action_name)}">${esc(r.action_name)}</td>
      <td class="pass">${makePassFail(r.pass_label, r)}</td>
      <td class="fail">${makePassFail(r.fail_label, r)}</td>`;
    tr.onclick = (e) => {
      if (isProcess  && e.target.classList.contains('action-name')) drillInto(r.action_id, r.action_name);
      else if (isDatabase && e.target.classList.contains('action-name')) showDbDetail(r, tr);
      else if (isList && e.target.classList.contains('action-name')) showListDetail(r, tr);
      else if (isCalc    && e.target.classList.contains('action-name')) showCalcDetail(r, tr);
      else if (isCompare && e.target.classList.contains('action-name')) showCompareDetail(r, tr);
      else if (isDialog  && e.target.classList.contains('action-name')) showDialogDetail(r, tr);
      else showDetail(r, tr);
    };
    tbody.appendChild(tr);
  });
}

function drillInto(processId, processName) {
  // Label is the current process name (the page we're leaving)
  const currentName = document.getElementById('inp-process').value || 'Previous';
  navStack.push({
    mode:      'detail',
    allRows:   allRows.slice(),
    backLabel: currentName,
    application: document.getElementById('inp-app').value
  });
  updateBackButton();
  closeDetail();
  // Navigate directly to the specific process object by ID
  openProcess(processId, processName, false);
}

async function showCallers(processName) {
  const app = document.getElementById('inp-app').value.trim();
  // Save current state so Back returns here
  navStack.push({ mode: viewMode === 'list'
    ? 'list' : 'detail',
    allRows:      allRows.slice(),
    searchList:   searchList.slice(),
    processInput: document.getElementById('inp-process').value,
    backLabel:    processName
  });
  updateBackButton();
  closeDetail();
  try {
    const res = await fetch(`/api/caller-objects?childProcess=${encodeURIComponent(processName)}&application=${encodeURIComponent(app)}&server=${encodeURIComponent(getServer())}`);
    const callers = await res.json();
    if (callers.error) throw new Error(callers.error);
    if (!callers.length) { alert(`No processes call "${processName}".`); goBack(); return; }
    searchList = callers;
    viewMode   = 'list';
    renderProcessList();
  } catch(e) {
    alert('Error loading callers: ' + e.message);
  }
}



// Build a character-grid terminal mockup from screen format rows for one screen_group
function renderScreenGrid(groupRows) {
  if (!groupRows.length) return '';
  // Parse "s8by20: Form XYZ" → rows=8, cols=20
  // Derive dimensions from screen_group: 4→8×16, 6→6×40, 8→8×20 (standard RF scanner)
  const sg = groupRows[0].screen_group;
  const DIM = { '4':{r:8,c:16}, '6':{r:6,c:40}, '8':{r:8,c:20} };
  const dim = DIM[String(sg)] || {r:8,c:20};
  const numRows = dim.r, numCols = dim.c;

  // Build a grid of {ch, type} — type: 'label'|'input'|'blank'
  const grid = Array.from({length: numRows}, () =>
    Array.from({length: numCols}, () => ({ch: ' ', type: 'blank'})));

  groupRows.forEach(r => {
    const row = (r.pos_row || 1) - 1;
    const col = (r.pos_column || 1) - 1;
    const w   = r.pos_width || 1;
    if (row < 0 || row >= numRows || col < 0) return;

    let type, text;
    if (r.data_type === -1) {
      // Input slot: show resolved prompt/field name if available, else underscores.
      // The backend now joins t_act_dialog_detail by slot order to supply these.
      type = 'input';
      const label = (r.prompt_text || r.field_name || '').substring(0, w);
      text = label ? label.padEnd(w, '_') : '_'.repeat(w);
    } else if (r.data_type === 0 || (!r.data_name && r.data_type !== 18)) {
      type = 'blank';
      text = ' '.repeat(w);
    } else {
      type = 'label';
      text = (r.data_name || '').substring(0, w).padEnd(w);
    }
    for (let i = 0; i < text.length && col + i < numCols; i++)
      grid[row][col + i] = {ch: text[i], type};
  });

  // Render as HTML spans so input fields can be styled differently
  const border = '─'.repeat(numCols + 2);
  let html = `<pre style="font-family:'Courier New',monospace;font-size:0.82rem;line-height:1.5;
    background:#0a1a0a;color:#33ff33;padding:8px 10px;border-radius:6px;
    border:2px solid #1a4d1a;display:inline-block;margin:0">`;
  html += `┌${border}┐\n`;
  for (let r = 0; r < numRows; r++) {
    html += '│ ';
    for (let c = 0; c < numCols; c++) {
      const cell = grid[r][c];
      const ch   = cell.ch === '<' ? '&lt;' : cell.ch === '>' ? '&gt;' : cell.ch === '&' ? '&amp;' : cell.ch;
      if (cell.type === 'input')
        html += `<span style="color:#ffff00;font-weight:700">${ch}</span>`;
      else if (cell.type === 'label')
        html += `<span style="color:#33ff33">${ch}</span>`;
      else
        html += `<span style="color:#1a5c1a"> </span>`;
    }
    html += ' │\n';
  }
  html += `└${border}┘</pre>`;
  return html;
}

    fetch(`/api/dialog-action/${encodeURIComponent(r.action_id)}?server=${encodeURIComponent(getServer())}`),
    fetch(`/api/dialog-screen/${encodeURIComponent(r.action_id)}?server=${encodeURIComponent(getServer())}`)
  ]);

        <td style="padding:3px 8px;color:#000">${esc(row.prompt_type_name)} ${esc(row.prompt_name)}</td>
        <td style="padding:3px 8px;color:#000">${esc(row.validation_type_name)} ${esc(row.validation_name)}</td>
        <td style="padding:3px 8px;text-align:center">${row.required === 'Y' ? '✔' : ''}</td>
        <td style="padding:3px 8px;text-align:center">${row.clear_initially === 'Y' ? '✔' : ''}</td>
      </tr>`).join('');
    extra.innerHTML += `
      <div style="font-weight:700;font-size:0.85rem;color:#1e40af;margin:12px 0 4px">📋 Fields &amp; Prompts</div>
      <table style="width:100%;border-collapse:collapse;font-size:0.78rem;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(124,58,237,0.10)">
        <thead><tr style="background:linear-gradient(90deg,#6d28d9,#4338ca);color:#fff">
          <th style="padding:4px 8px">#</th>
          <th style="padding:4px 8px">Field</th>
          <th style="padding:4px 8px">Prompt</th>
          <th style="padding:4px 8px">Validation</th>
          <th style="padding:4px 8px">Req</th>
          <th style="padding:4px 8px">Clr</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>

  }

  document.getElementById('detail-content').appendChild(extra);
}

// Switch screen format tabs
function dlgTab(tabId, idx) {
  let i = 0;
  while (document.getElementById(`${tabId}-panel-${i}`)) {
    const panel = document.getElementById(`${tabId}-panel-${i}`);
    const btn   = document.getElementById(`${tabId}-btn-${i}`);
    const active = i === idx;
    panel.style.display = active ? 'block' : 'none';
    btn.style.background = active ? '#0a1a0a' : '#d1fae5';
    btn.style.color      = active ? '#33ff33' : '#065f46';
    i++;
  }
}

async function showCompareDetail(r, tr) {

  } catch(e) {
    document.getElementById('detail-content').innerHTML = `<p style="color:#f38ba8">Error: ${e.message}</p>`;
  }

async function showCalcDetail(r, tr) {
  document.querySelectorAll('tbody tr.selected').forEach(el => el.classList.remove('selected'));
  tr.classList.add('selected');
  document.getElementById('detail-title').textContent = `🧮 Calculate: ${r.action_name || ''}`;
  document.getElementById('detail-content').innerHTML = '<p style="color:#8892a4;font-size:0.83rem">Loading…</p>';
  document.getElementById('detail-panel').style.display = 'block';
  try {
    const res  = await fetch(`/api/calc-action/${encodeURIComponent(r.action_id)}?server=${encodeURIComponent(getServer())}`);
    const rows = await res.json();
    if (!rows.length) {
      document.getElementById('detail-content').innerHTML = '<p style="color:#f38ba8">No detail found.</p>';
      return;
    }

    // Helper: format an operand with its type
    const fmtOp = (type, name) => {
      if (name == null) return null;
      if (type === 17) return `[Field: ${name}]`;
      if (type === 19) return `[Record: ${name}]`;
      if (type === 18) return `"${name}"`;   // constant value
      return name;
    };

    // Helper: build readable expression from one detail row
    const buildExpr = d => {
      const res  = fmtOp(d.result_type, d.result_name)   || '?';
      const op1  = fmtOp(d.operand1_type, d.operand1_name);
      const op2  = fmtOp(d.operand2_type, d.operand2_name);
      const op3  = fmtOp(d.operand3_type, d.operand3_name);
      const sym  = d.operator_symbol;
      let rhs;
      if      (sym === 'Len')    rhs = `Len(${op1})`;
      else if (sym === 'Mid')    rhs = op3 ? `Mid(${op1}, ${op2}, ${op3})` : `Mid(${op1}, ${op2})`;
      else if (sym === 'Search') rhs = `Search(${op1}, ${op2})`;
      else if (sym === ':=')     rhs = op1;
      else if (op2)              rhs = `${op1} ${sym} ${op2}`;
      else                       rhs = op1;
      return `${res} = ${rhs}`;
    };

    const first = rows[0];
    let html = '';
    if (first.description) html += `<div class="detail-row"><span class="detail-label">Description</span><span class="detail-val">${first.description}</span></div>`;
    html += `<table style="width:100%;border-collapse:collapse;margin-top:8px;font-size:0.8rem;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(124,58,237,0.10)">
      <thead><tr style="background:linear-gradient(90deg,#6d28d9,#4338ca);color:#ffffff">
        <th style="padding:4px 6px;text-align:left;width:36px">#</th>
        <th style="padding:4px 6px;text-align:left">Expression</th>
      </tr></thead><tbody>`;
    rows.forEach((d, i) => {
      html += `<tr style="border-bottom:1px solid #ede9fe;background:${i%2===0?'#faf5ff':'#f5f3ff'}">
        <td style="padding:3px 6px;color:#000000;font-weight:700">${d.sequence}</td>
        <td style="padding:3px 6px;font-family:monospace;color:#000000">${buildExpr(d)}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('detail-content').innerHTML = html;
  } catch(e) {
    document.getElementById('detail-content').innerHTML = `<p style="color:#f38ba8">Error: ${e.message}</p>`;
  }
}

async function goBack() {
  if (!navStack.length) return;
  const prev = navStack.pop();
  closeDetail();

  if (prev.mode === 'list') {
    searchList = prev.searchList;
    document.getElementById('inp-process').value = prev.processInput;
    viewMode = 'list';
    updateBackButton();
    renderProcessList();
  } else {
    allRows  = prev.allRows;
    document.getElementById('inp-process').value = prev.backLabel;
    viewMode = 'detail';
    updateBackButton();
    renderTable();
  }
}

function toggleGroup(groupKey, headerRow) {
  const rows = document.querySelectorAll(`tr.detail-row[data-group="${groupKey}"]`);
  const icon = headerRow.querySelector('.toggle-icon');
  const isExpanded = icon.textContent === '▼';
  rows.forEach(r => r.style.display = isExpanded ? 'none' : 'table-row');
  icon.textContent = isExpanded ? '▶' : '▼';
}

async function showDbDetail(r, tr) {
  document.querySelectorAll('tbody tr.selected').forEach(el => el.classList.remove('selected'));
  tr.classList.add('selected');
  document.getElementById('detail-title').textContent = `📋 DB: ${r.action_name || ''}`;
  document.getElementById('detail-content').innerHTML = '<p style="color:#8892a4;font-size:0.83rem">Loading statement…</p>';
  document.getElementById('detail-panel').style.display = 'block';
  try {
    const res  = await fetch(`/api/db-action/${encodeURIComponent(r.action_id)}?server=${encodeURIComponent(getServer())}`);
    const rows = await res.json();
    if (!rows.length) {
      document.getElementById('detail-content').innerHTML = '<p style="color:#f38ba8">No statement found.</p>';
      return;
    }
    const html = rows.map(row => `
      <div class="detail-row"><span class="detail-label">Name</span><span class="detail-val">${row.name || ''}</span></div>
      <div class="detail-row"><span class="detail-label">Description</span><span class="detail-val">${row.description || ''}</span></div>
      <div class="detail-row"><span class="detail-label">Seq</span><span class="detail-val">${row.sequence}</span></div>
      <pre class="db-statement">${(row.statement || '').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
      <hr style="border-color:#d0d7e8;margin:10px 0"/>
    `).join('');
    document.getElementById('detail-content').innerHTML = html;
  } catch(e) {
    document.getElementById('detail-content').innerHTML = `<p style="color:#f38ba8">Error: ${e.message}</p>`;
  }
}

async function showListDetail(r, tr) {
  document.querySelectorAll('tbody tr.selected').forEach(el => el.classList.remove('selected'));
  tr.classList.add('selected');
  document.getElementById('detail-title').textContent = `📝 List: ${r.action_name || ''}`;
  document.getElementById('detail-content').innerHTML = '<p style="color:#8892a4;font-size:0.83rem">Loading…</p>';
  document.getElementById('detail-panel').style.display = 'block';
  try {
    const res  = await fetch(`/api/list-action/${encodeURIComponent(r.action_id)}?server=${encodeURIComponent(getServer())}`);
    const rows = await res.json();
    if (!rows.length) {
      document.getElementById('detail-content').innerHTML = '<p style="color:#f38ba8">No detail found.</p>';
      return;
    }
    const d = rows[0];
    const typeLabel = t => t === 17 ? 'Field' : t === 19 ? 'Record' : t === -1 ? '' : '';
    const op1 = d.operand1_name ? `[${typeLabel(d.operand1_type)}: ${d.operand1_name}]` : null;
    const op2 = d.operand2_name ? `[${typeLabel(d.operand2_type)}: ${d.operand2_name}]` : null;
    const row = (label, val) => val != null && val !== ''
      ? `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-val">${val}</span></div>`
      : '';
    document.getElementById('detail-content').innerHTML =
      row('Name',        d.name)        +
      row('Description', d.description) +
      row('List',        d.list_name)   +
      row('Operation',   d.operator_name) +
      (op1 ? row('Operand 1', op1) : '') +
      (op2 ? row('Operand 2', op2) : '') +
      (d.operator_name === 'Find' ? row('Find Exact', d.find_exact ? 'Yes' : 'No') : '');
  } catch(e) {
    document.getElementById('detail-content').innerHTML = `<p style="color:#f38ba8">Error: ${e.message}</p>`;
  }
}

function showDetail(r, tr) {
  document.querySelectorAll('tbody tr.selected').forEach(el => el.classList.remove('selected'));
  tr.classList.add('selected');
  document.getElementById('detail-title').textContent = `Seq ${r.sequence}: ${r.action_type_name}`;
  document.getElementById('detail-content').innerHTML = [
    ['Process',     esc(r.process_name)],
    ['Sequence',    r.sequence],
    ['Label',       esc(r.label)],
    ['Action Type', esc(r.action_type_name)],
    ['Action Name', esc(r.action_name)],
    ['On Pass',     makePassFail(r.pass_label, r)],
    ['On Fail',     makePassFail(r.fail_label, r)],
    ['Commented',   r.commented_out ? '⚠ Yes' : 'No'],
    ['Action ID',   `<span style="font-size:0.75rem">${esc(r.action_id)}</span>`],
    ['Process ID',  `<span style="font-size:0.75rem">${esc(r.process_id)}</span>`],
  ].map(([l,v]) => `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-val">${v||'—'}</span></div>`).join('');
  document.getElementById('detail-panel').style.display = 'block';
}

function closeDetail() {
  document.getElementById('detail-panel').style.display = 'none';
  document.querySelectorAll('tbody tr.selected').forEach(el => el.classList.remove('selected'));
}

document.getElementById('inp-process').addEventListener('keydown', e => { if(e.key==='Enter') loadData(); });

// On first load: show T_DEVICE processes; if that fails, fall back to a normal search
loadDevices();
</script>
