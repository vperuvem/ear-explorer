<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HighJump EAR Tester</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif;
         background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 100%);
         background-attachment: fixed; color: #0f172a; min-height: 100vh; }

  header { background: #ffffff; padding: 10px 24px; border-bottom: 3px solid #7c3aed;
           display: flex; align-items: center; gap: 12px;
           box-shadow: 0 2px 8px rgba(124,58,237,0.10); flex-wrap: nowrap; }
  header h1 { font-size: 1.2rem; color: #7c3aed; white-space: nowrap; margin-right: 8px; }
  header select {
    background: #f5f3ff; border: 1.5px solid #c4b5fd; color: #1e1b4b;
    padding: 5px 10px; border-radius: 6px; font-size: 0.88rem; outline: none; height: 32px; }
  header select:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.18); }
  header button {
    background: #7c3aed; color: #fff; border: none; padding: 5px 14px;
    border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.88rem; height: 32px; }
  header button:hover { background: #6d28d9; }
  .nav-link { background: #ede9fe; color: #6d28d9; border: 1.5px solid #c4b5fd;
              padding: 5px 12px; border-radius: 6px; font-size: 0.83rem; font-weight: 600;
              text-decoration: none; white-space: nowrap; height: 32px; display: inline-flex;
              align-items: center; }
  .nav-link:hover { background: #ddd6fe; }

  .content { padding: 20px 24px; }

  /* Controls card */
  .card { background: #fff; border-radius: 10px; padding: 18px 20px; margin-bottom: 18px;
          box-shadow: 0 4px 20px rgba(67,56,202,0.10); border-left: 4px solid #7c3aed; }
  .card h2 { font-size: 1rem; color: #6d28d9; margin-bottom: 12px; }
  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .entry-select { background: #f5f3ff; border: 1.5px solid #c4b5fd; color: #1e1b4b;
                  padding: 4px 10px; border-radius: 6px; font-size: 0.83rem;
                  width: auto; outline: none; height: 32px; }
  .entry-select:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.18); }

  /* Inline stat chips in header */
  .stat-chip { display: inline-flex; flex-direction: column; align-items: center;
               line-height: 1; padding: 3px 10px; border-radius: 6px; white-space: nowrap; }
  .stat-chip .num { font-size: 1rem; font-weight: 800; }
  .stat-chip .lbl { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.04em; margin-top: 1px; }
  .pass-chip { background: #d1fae5; color: #065f46; }
  .fail-chip { background: #fee2e2; color: #991b1b; }
  .tot-chip  { background: #ede9fe; color: #5b21b6; }

  /* Results table — same as index.html grid */
  .grid-wrap { overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem;
          background: #fff; border-radius: 10px; overflow: hidden;
          box-shadow: 0 4px 20px rgba(67,56,202,0.12); }
  thead th { background: linear-gradient(90deg, #6d28d9 0%, #4338ca 100%); color: #fff;
             padding: 9px 12px; text-align: left; white-space: nowrap;
             border-bottom: 2px solid #5b21b6; }
  tbody tr { border-bottom: 1px solid rgba(0,0,0,0.06); }
  tbody td { padding: 7px 12px; white-space: nowrap; max-width: 380px;
             overflow: hidden; text-overflow: ellipsis; color: #000; font-size: 0.83rem; }
  tr.pass-row { background: #d1fae5; }
  tr.fail-row { background: #fee2e2; }
  tr.err-row  { background: #fef9c3; }
  .run-at { font-size: 0.78rem; color: #6b7280; margin-top: 6px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #c4b5fd;
             border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Reachable dialogs grid */
  .dlg-section { margin-top: 18px; }
  .dlg-hdr { font-size: 0.75rem; font-weight: 700; color: #6d28d9; text-transform: uppercase;
             letter-spacing: 0.07em; margin-bottom: 8px; }
  .dlg-grid { background: #fff; border-radius: 10px; overflow: hidden;
              box-shadow: 0 4px 20px rgba(67,56,202,0.12); border: 1px solid #e0d9f7; }
  /* Each dialog is its own <table> with fixed column widths */
  .dlg-row { width: 100%; border-collapse: collapse; border-bottom: 1px solid #ede9fe;
             table-layout: fixed; }
  .dlg-row:last-child { border-bottom: none; }
  .dlg-row:hover td { background: #f5f3ff; }
  .dlg-num  { width: 48px; min-width: 48px; text-align: right; padding: 7px 10px 7px 14px;
              font-size: 0.82rem; color: #a78bfa; font-weight: 700; vertical-align: top;
              border-right: 1px solid #e0d9f7; white-space: nowrap; }
  .dlg-name { width: 260px; padding: 7px 14px; font-size: 0.82rem; font-weight: 700;
              color: #4c1d95; background: #faf5ff; border-right: 2px solid #e0d9f7;
              vertical-align: top; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dlg-paths { padding: 5px 16px; vertical-align: top; }
  .path-line { display: block; font-size: 0.79rem; color: #1e1b4b; line-height: 1.85;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: default; }
  .path-line::before { content: '\21b3\00a0'; color: #7c3aed; font-weight: 700; }
  .path-more { display: block; font-size: 0.71rem; color: #9ca3af; margin-top: 2px;
               font-style: italic; user-select: none; }

  /* Dynamic menu calls grid */
  .dyn-grid { background: #fff; border-radius: 10px; overflow: hidden;
              box-shadow: 0 4px 20px rgba(67,56,202,0.12); border: 1px solid #dbeafe; }
  .dyn-row  { width: 100%; border-collapse: collapse; border-bottom: 1px solid #eff6ff;
              table-layout: fixed; }
  .dyn-row:last-child { border-bottom: none; }
  .dyn-row:hover td   { background: #f0f9ff; }
  .dyn-proc    { width: 200px; padding: 7px 14px; font-size: 0.82rem; font-weight: 700;
                 color: #1d4ed8; background: #eff6ff; border-right: 2px solid #dbeafe;
                 vertical-align: top; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dyn-callers { width: 300px; padding: 5px 14px; vertical-align: top;
                 border-right: 1px solid #dbeafe; }
  .dyn-options { padding: 5px 14px; vertical-align: top; }
  .dyn-caller-line { display: block; font-size: 0.79rem; line-height: 1.85;
                     white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: default; }
  .menu-opt       { margin-bottom: 6px; }
  .menu-opt-label { display: block; font-size: 0.79rem; font-weight: 700; color: #1d4ed8;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .menu-opt-label::before { content: '\21b3\00a0'; color: #3b82f6; }
  .menu-opt-path  { display: block; font-size: 0.74rem; color: #6b7280; padding-left: 1.1rem;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .menu-opt-dlg   { display: block; font-size: 0.74rem; color: #059669; padding-left: 1.1rem;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Right-click context menu */
  .ctx-menu { position: fixed; background: #1e1b4b; color: #e0e7ff; border-radius: 7px;
              padding: 4px 0; font-size: 0.8rem; z-index: 10000; min-width: 190px;
              box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none; user-select: none; }
  .ctx-item { padding: 9px 18px; cursor: pointer; }
  .ctx-item:hover { background: rgba(255,255,255,0.12); }

  /* Hover tooltip — fixed position, pointer-events on so you can hover inner items */
  .path-tip { position: fixed; background: #1e1b4b; color: #e0e7ff; border-radius: 8px;
              padding: 10px 14px; font-size: 0.76rem; max-width: 820px; z-index: 9999;
              pointer-events: auto; display: none; line-height: 1.7;
              box-shadow: 0 6px 24px rgba(0,0,0,0.4); }
  .path-tip b  { display: block; font-size: 0.82rem; margin-bottom: 4px; color: #c4b5fd; }
  .tip-lbl     { display: block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em;
                 text-transform: uppercase; color: #818cf8; margin: 8px 0 2px; }
  .path-row    { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                 cursor: default; border-radius: 3px; padding: 1px 4px; margin: 0 -4px; }
  .path-row-shown { color: #e0e7ff; }
  .path-row-more  { color: #94a3b8; }
  .path-row + .path-row { border-top: 1px solid rgba(255,255,255,0.07); padding-top: 1px; }
  /* Hovered path inside tooltip expands to reveal full text */
  .path-tip .path-row:hover { white-space: normal; overflow: visible; text-overflow: unset;
                               background: rgba(124,58,237,0.30); }
</style>
</head>
<body>

<header>
  <h1>🧪 HighJump EAR Tester</h1>
  <select id="inp-entry" class="entry-select">
    <option value="">— loading… —</option>
  </select>
  <button id="btn-run" onclick="runTests()">▶ Run Tests</button>
  <button onclick="loadResults()" style="background:#ede9fe;color:#6d28d9;border:1.5px solid #c4b5fd;">⟳ Refresh</button>
  <a id="report-link" href="#" target="_blank" class="nav-link">📊 Report</a>
  <span class="stat-chip pass-chip"><span class="num" id="stat-pass">—</span><span class="lbl">PASS</span></span>
  <span class="stat-chip fail-chip"><span class="num" id="stat-fail">—</span><span class="lbl">FAIL</span></span>
  <span class="stat-chip tot-chip" ><span class="num" id="stat-tot" >—</span><span class="lbl">TOTAL</span></span>
  <span id="stat-time" class="run-at"></span>
  <span id="stat-url"  class="run-at" style="color:#4338ca;"></span>

  <select id="inp-server" style="margin-left:auto; font-size:0.8rem; border:1.5px solid #c4b5fd;
          border-radius:6px; padding:3px 8px; background:#f5f3ff; color:#1e1b4b; font-weight:600;">
    <option value="ArcadiaWHJSqlStage" selected>ArcadiaWHJSqlStage</option>
    <option value="RetailRHjsqldev">RetailRHjsqldev</option>
    <option value="RetailRHjsqlStage">RetailRHjsqlStage</option>
  </select>
</header>

<div class="content">

  <div class="grid-wrap">
    <table id="results-table">
      <thead>
        <tr>
          <th style="width:130px">Suite</th>
          <th>Test Name</th>
          <th style="width:80px">Status</th>
          <th style="width:70px">Time</th>
          <th>Detail</th>
        </tr>
      </thead>
      <tbody id="results-body">
        <tr><td colspan="5" style="color:#8892a4;padding:14px;text-align:center">
          No results yet — click ▶ Run Tests or ⟳ Refresh Results</td></tr>
      </tbody>
    </table>
  </div>

  <div id="dlg-section" class="dlg-section" style="display:none">
    <div class="dlg-hdr">Reachable Dialogs</div>
    <div id="dlg-grid" class="dlg-grid"></div>
  </div>

</div>

<div id="path-tip" class="path-tip"></div>
<div id="ctx-menu" class="ctx-menu">
  <div class="ctx-item" onclick="copyPaths()">📋 Copy all paths</div>
</div>

<script>
let polling = null;

function esc(s) {
  return (s == null ? '' : String(s))
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Path coloring by keyword ──────────────────────────────────────────────────
// G = outbound/revenue (green)   O = inbound/non-revenue (orange)
// B = ECom shipping / Exp (blue) D = Transfer / Tfr (dull grey)
const GREEN_RE  = /load|pick|ship|cross.?dock|xdock/i;
const ORANGE_RE = /receiv|receipt|\brec\b|putaway|put.?away|\bmove\b/i;
const BLUE_RE   = /\bexp\b/i;
const DULL_RE   = /transfer|\btfr\b/i;

function classifyStep(name) {
  if (BLUE_RE.test(name))   return 'B';
  if (DULL_RE.test(name))   return 'D';
  if (GREEN_RE.test(name))  return 'G';
  if (ORANGE_RE.test(name)) return 'O';
  return null;
}

// Returns inner HTML for a path string with per-step color spans.
// darkBg=true → bright shades for dark tooltip; false → deep shades for white grid.
// Rules:
//   • backfill leading neutral steps with the first found color
//   • carry color forward through subsequent neutral steps
//   • switch color when a new keyword appears
function colorPathHtml(pathStr, darkBg) {
  const steps = pathStr.split(' \u2192 ');           // split on →
  const raw   = steps.map(s => classifyStep(s));

  const firstIdx = raw.findIndex(c => c !== null);
  if (firstIdx === -1) return esc(pathStr);          // no keywords — plain text

  // Build effective-color array
  const colors = raw.slice();
  for (let i = 0; i < firstIdx; i++) colors[i] = raw[firstIdx];  // backfill
  let cur = raw[firstIdx];
  for (let i = firstIdx; i < colors.length; i++) {
    if (raw[i] !== null) cur = raw[i];
    colors[i] = cur;                                 // forward-carry
  }

  const palette = {
    G: darkBg ? '#4ade80' : '#15803d',   // green  — outbound / revenue
    O: darkBg ? '#fb923c' : '#c2410c',   // orange — inbound / non-revenue
    B: darkBg ? '#60a5fa' : '#1d4ed8',   // blue   — ECom shipping (Exp)
    D: darkBg ? '#94a3b8' : '#64748b',   // dull   — Transfer / Tfr
  };
  const AR = darkBg ? '#818cf8' : '#7c3aed';  // arrow separator

  return steps
    .map((step, i) => {
      const c = palette[colors[i]] || palette.G;
      return `<span style="color:${c};font-weight:600">${esc(step)}</span>`;
    })
    .join(`<span style="color:${AR}"> \u2192 </span>`);
}

async function loadEntryPoints() {
  const server = document.getElementById('inp-server').value;
  const sel    = document.getElementById('inp-entry');
  sel.innerHTML = '<option value="">— loading… —</option>';
  try {
    const rows = await (await fetch(`/api/devices?server=${encodeURIComponent(server)}`)).json();
    const vt = rows.filter(r => /virtual/i.test(r.dev_type));
    if (!vt.length) { sel.innerHTML = '<option value="">— no virtual terminal entry points found —</option>'; return; }
    sel.innerHTML = vt.map(r =>
      `<option value="${esc(r.id)}" data-app="${esc(r.app_name)}" data-proc="${esc(r.process_name)}">` +
      `${esc(r.app_name)} – ${esc(r.process_name)}</option>`
    ).join('');
  } catch(e) { sel.innerHTML = '<option value="">— error loading devices —</option>'; }
}

async function runTests() {
  const sel   = document.getElementById('inp-entry');
  const entry = sel.value;
  const app   = sel.selectedOptions[0]?.dataset.app  || '';
  const proc  = sel.selectedOptions[0]?.dataset.proc || '';
  const url   = `/api/tests/run?entry=${encodeURIComponent(entry)}&app=${encodeURIComponent(app)}&proc=${encodeURIComponent(proc)}`;
  const res   = await fetch(url, { method: 'POST' });
  const d     = await res.json();
  if (d.status === 'already_running') { alert('Tests already running.'); return; }
  setRunning(true);
  if (!polling) polling = setInterval(checkStatus, 2500);
}

async function checkStatus() {
  const res = await fetch('/api/tests/status');
  const d   = await res.json();
  if (!d.running) {
    clearInterval(polling); polling = null;
    setRunning(false);
    await loadResults();
  }
}

function setRunning(on) {
  const btn = document.getElementById('btn-run');
  btn.disabled = on;
  btn.innerHTML = on ? '<span class="spinner"></span> Running…' : '▶ Run Tests';
}

async function loadResults() {
  const res = await fetch('/api/tests/results');
  const d   = await res.json();
  if (!d.results || !d.results.length) return;

  document.getElementById('stat-pass').textContent = d.passed  ?? '—';
  document.getElementById('stat-fail').textContent = (d.failed ?? 0) + (d.errors ?? 0);
  document.getElementById('stat-tot' ).textContent = d.total   ?? '—';
  document.getElementById('stat-url' ).textContent = d.baseUrl ?? '';
  if (d.runAt) {
    const dt = new Date(d.runAt);
    document.getElementById('stat-time').textContent = 'Run: ' + dt.toLocaleString();
  }

  const tbody = document.getElementById('results-body');
  tbody.innerHTML = d.results.map(r => {
    const cls = r.status === 'PASS' ? 'pass-row' : r.status === 'FAIL' ? 'fail-row' : 'err-row';
    const icon = r.status === 'PASS' ? '✅' : r.status === 'FAIL' ? '❌' : '⚠️';
    return `<tr class="${cls}">
      <td>${esc(r.suite)}</td>
      <td>${esc(r.name)}</td>
      <td style="font-weight:700">${icon} ${esc(r.status)}</td>
      <td>${r.ms ?? ''}ms</td>
      <td title="${esc(r.detail)}">${esc(r.detail)}</td>
    </tr>`;
  }).join('');
}

// ── Reachable Dialogs ─────────────────────────────────────────────────────────
let dlgMap   = {}; // { dialogName: [path, ...] } sorted shortest-first
let ctxPaths = []; // paths for the currently right-clicked row

async function loadDialogs() {
  const sel     = document.getElementById('inp-entry');
  const entry   = sel.value;
  const app     = sel.selectedOptions[0]?.dataset.app || '';
  const server  = document.getElementById('inp-server').value;
  const section = document.getElementById('dlg-section');
  const grid    = document.getElementById('dlg-grid');

  if (!entry) { section.style.display = 'none'; dlgMap = {}; return; }

  section.style.display = 'block';
  grid.innerHTML = '<div style="padding:12px;color:#8892a4;font-size:0.82rem">Loading…</div>';

  try {
    const resp = await fetch(
      `/api/tester/dialogs?server=${encodeURIComponent(server)}&entry=${encodeURIComponent(entry)}&app=${encodeURIComponent(app)}`
    );
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const rows = await resp.json();
    if (!Array.isArray(rows)) throw new Error(rows?.error || 'bad response');

    // Group by dialog name; track type (dialog vs menu)
    const raw    = {};
    const typeOf = {};
    for (const r of rows) {
      if (!raw[r.dialog_name]) raw[r.dialog_name] = [];
      raw[r.dialog_name].push(r.call_path);
      typeOf[r.dialog_name] = r.type || 'dialog';
    }

    // Sort each dialog's paths: fewest hops first, then alpha; deduplicate
    dlgMap = {};
    for (const [name, paths] of Object.entries(raw)) {
      const unique = [...new Set(paths)];
      unique.sort((a, b) => {
        const ah = (a.match(/→/g) || []).length, bh = (b.match(/→/g) || []).length;
        return ah - bh || a.localeCompare(b);
      });
      dlgMap[name] = unique;
    }

    const names = Object.keys(dlgMap).sort();
    if (!names.length) {
      grid.innerHTML = '<div style="padding:12px;color:#8892a4;font-size:0.82rem">No reachable dialogs found.</div>';
      return;
    }

    // Build one <table> per item — dialogs (purple name) or dynamic menus (blue name)
    grid.innerHTML = names.map((name, i) => {
      const paths  = dlgMap[name];
      const isMenu = typeOf[name] === 'menu';
      const shown  = paths.slice(0, 5);
      const extra  = paths.length - 5;
      const pHtml  = shown.map(p =>
        `<span class="path-line" title="${esc(p)}">${colorPathHtml(p, false)}</span>`
      ).join('');
      const mHtml = extra > 0
        ? `<span class="path-more">+${extra} more path${extra > 1 ? 's' : ''} — hover or right-click to see all</span>`
        : '';
      const nameStyle = isMenu ? 'color:#1d4ed8;background:#eff6ff;border-right:2px solid #dbeafe;' : '';
      return `<table class="dlg-row" data-name="${esc(name)}" data-shown="${shown.length}"><tr>` +
        `<td class="dlg-num">${i + 1}</td>` +
        `<td class="dlg-name" style="${nameStyle}" title="${esc(name)}">${esc(name)}</td>` +
        `<td class="dlg-paths">${pHtml}${mHtml}</td>` +
        `</tr></table>`;
    }).join('');

    // Wire hover tooltip + right-click per row
    grid.querySelectorAll('.dlg-row').forEach(tbl => {
      const name       = tbl.dataset.name;
      const paths      = dlgMap[name] || [];
      const shownCnt   = parseInt(tbl.dataset.shown, 10);
      const shownPaths = paths.slice(0, shownCnt);
      const morePaths  = paths.slice(shownCnt);

      tbl.addEventListener('mouseenter', e => {
        // Top paths (bright) — no label
        const shownHtml = shownPaths.map(p =>
          `<span class="path-row path-row-shown">\u21b3\u00a0${colorPathHtml(p, true)}</span>`
        ).join('');
        // Additional hidden paths (muted) — single section label
        const moreHtml = morePaths.length
          ? `<span class="tip-lbl">More paths (${morePaths.length}):</span>` +
            morePaths.map(p =>
              `<span class="path-row path-row-more">\u21b3\u00a0${colorPathHtml(p, true)}</span>`
            ).join('')
          : '';
        tip.innerHTML = `<b>${esc(name)}</b>${shownHtml}${moreHtml}`;
        tip.style.display = 'block';
        anchorTip(e);
      });
      tbl.addEventListener('mouseleave', scheduleTipHide);
      tbl.addEventListener('contextmenu', e => {
        e.preventDefault(); hideTip();
        ctxPaths = paths;
        const m = document.getElementById('ctx-menu');
        m.style.left    = e.clientX + 'px';
        m.style.top     = e.clientY + 'px';
        m.style.display = 'block';
      });
    });
  } catch(e) {
    grid.innerHTML = `<div style="padding:12px;color:#dc2626;font-size:0.82rem">Error loading dialogs: ${esc(e.message)}</div>`;
  }
}

function copyPaths() {
  if (!ctxPaths.length) return;
  const text = ctxPaths.join('\n');
  navigator.clipboard.writeText(text).catch(() => {
    const ta = Object.assign(document.createElement('textarea'), { value: text });
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  });
  document.getElementById('ctx-menu').style.display = 'none';
}

// Dismiss context menu on outside click or Escape
document.addEventListener('click',   () => document.getElementById('ctx-menu').style.display = 'none');
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('ctx-menu').style.display = 'none'; });

const tip = document.getElementById('path-tip');
let tipTimer = null;

// Position tooltip near where the mouse entered — fixed from that point on
function anchorTip(e) {
  const tipW = 820;
  let x = e.clientX + 18;
  if (x + tipW > window.innerWidth) x = Math.max(8, e.clientX - tipW - 10);
  let y = e.clientY - 10;
  const tipH = tip.offsetHeight;
  if (y + tipH > window.innerHeight - 8) y = Math.max(8, window.innerHeight - tipH - 8);
  tip.style.left = x + 'px';
  tip.style.top  = Math.max(8, y) + 'px';
}

function scheduleTipHide() {
  tipTimer = setTimeout(() => { tip.style.display = 'none'; }, 350);
}
function cancelTipHide() {
  if (tipTimer) { clearTimeout(tipTimer); tipTimer = null; }
}
function hideTip() { clearTimeout(tipTimer); tip.style.display = 'none'; }

// Keep tooltip alive when mouse travels into it
tip.addEventListener('mouseenter', cancelTipHide);
tip.addEventListener('mouseleave', scheduleTipHide);

// Auto-load on open
loadEntryPoints().then(() => loadDialogs());
loadResults();

// Refresh when server changes
document.getElementById('inp-server').addEventListener('change', () =>
  loadEntryPoints().then(() => loadDialogs()));

// Reload when entry point changes
document.getElementById('inp-entry').addEventListener('change', loadDialogs);
</script>
</body>
